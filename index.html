<!DOCTYPE html>
<html lang="en">
<head>

<title>The Understanding Method | The Museum of English</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  background:#f5efe6;
  color:#252321;
  font-family:'Inter',sans-serif;
  line-height:1.8;
}

header{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:70px 24px;
  background:
    linear-gradient(rgba(245,239,230,.90),rgba(245,239,230,.98)),
    radial-gradient(circle at top left,#c7a06a,transparent 32%),
    radial-gradient(circle at bottom right,#66725a,transparent 34%);
}

.hero{
  max-width:850px;
}

.kicker{
  letter-spacing:4px;
  text-transform:uppercase;
  font-size:.78rem;
  color:#7a6652;
  margin-bottom:28px;
}

h1{
  font-family:'Cormorant Garamond',serif;
  font-size:4.5rem;
  font-weight:600;
  line-height:1.05;
  margin-bottom:22px;
}

h2{
  font-family:'Cormorant Garamond',serif;
  font-size:2.2rem;
  font-weight:400;
  color:#6f5e49;
  margin-bottom:28px;
}

.subtitle{
  font-size:1.12rem;
  max-width:700px;
  margin:0 auto 38px;
  color:#4d4a46;
}

.button{
  display:inline-block;
  padding:16px 36px;
  border:1px solid #7a6652;
  border-radius:999px;
  color:#7a6652;
  text-decoration:none;
  font-weight:500;
}

.button:hover{
  background:#7a6652;
  color:#fff;
}
